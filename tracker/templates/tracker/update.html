{% extends 'tracker/base.html' %}
{% block title %}Update Transaction{% endblock %}
{% block content %}
<div class="mb-3">
  <a href="{% url 'transactions' %}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left"></i> Back to Transactions</a>
</div>
<div class="form-card">
  <div class="card">
    <div class="p-3 fw-bold" style="border-bottom:1px solid var(--border);">
      <i class="bi bi-pencil me-1"></i> Update Transaction #{{ txn.pk }}
      <div class="text-muted fw-normal" style="font-size:.78rem;margin-top:.2rem;">
        Current: {{ txn.transaction_type|capfirst }} · ₹{{ txn.amount }} · {{ txn.detail }}
      </div>
    </div>
    <div class="p-4">
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">New Amount (₹)</label>
          <div class="input-group">
            <span class="input-group-text">₹</span>
            <input type="number" name="amount" class="form-control" value="{{ txn.amount }}" step="0.01" min="0.01" required/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">{% if txn.transaction_type == 'income' %}Income Source{% else %}Category{% endif %}</label>
          <input type="text" name="detail" class="form-control" value="{{ txn.detail }}" required/>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-blue fw-semibold py-2"><i class="bi bi-check-lg me-1"></i> Update Transaction</button>
          <a href="{% url 'transactions' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
