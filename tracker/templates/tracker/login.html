{% extends 'tracker/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <div class="icon">💰</div>
      <h4>Welcome Back</h4>
      <p>Sign in to your account</p>
    </div>
    <div class="auth-body">
      {% for message in messages %}
        <div class="auth-msg {% if message.tags == 'error' %}err{% elif message.tags == 'success' %}suc{% else %}inf{% endif %}">
          <i class="bi {% if message.tags == 'error' %}bi-x-circle{% elif message.tags == 'success' %}bi-check-circle{% else %}bi-info-circle{% endif %}"></i>
          {{ message }}
        </div>
      {% endfor %}
      <form method="POST" action="/login">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" value="{{ request.POST.username }}" required autofocus/>
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" name="password" id="lpw" class="form-control" placeholder="Enter your password" required/>
            <button class="btn btn-outline-secondary" type="button" onclick="togglePw()" style="border-color:var(--border);"><i class="bi bi-eye" id="lpwIcon"></i></button>
          </div>
        </div>
        <button type="submit" class="btn btn-blue w-100 py-2 fw-semibold"><i class="bi bi-box-arrow-in-right me-1"></i> Sign In</button>
      </form>
      <hr class="my-3"/>
      <p class="text-center text-muted small mb-0">New here? <a href="/register" class="fw-semibold text-decoration-none" style="color:#1a56db;">Create an account</a></p>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePw(){const el=document.getElementById('lpw'),icon=document.getElementById('lpwIcon');if(el.type==='password'){el.type='text';icon.className='bi bi-eye-slash';}else{el.type='password';icon.className='bi bi-eye';}}
</script>
{% endblock %}
