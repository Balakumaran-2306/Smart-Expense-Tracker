{% extends 'tracker/base.html' %}
{% block title %}Add Expense{% endblock %}
{% block content %}
<div class="mb-3">
  <a href="{% url 'dashboard' %}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
</div>
<div class="form-card">
  <div class="card">
    <div class="p-3 fw-bold d-flex align-items-center gap-2" style="border-bottom:1px solid var(--border);background:#fde8e8;border-radius:.875rem .875rem 0 0;">
      <i class="bi bi-dash-circle-fill text-danger"></i>
      <span style="color:#c81e1e;">Add Expense</span>
    </div>
    <div class="p-4">
      <form method="POST" action="{% url 'add_expense' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Amount (₹)</label>
          <div class="input-group">
            <span class="input-group-text">₹</span>
            <input type="number" name="amount" class="form-control" placeholder="0.00" step="0.01" min="0.01" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Category</label>
          <select name="category" class="form-select" required>
            <option value="" disabled selected>-- Choose a category --</option>
            {% for cat in categories %}
              <option value="{{ cat }}">{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-danger fw-semibold py-2"><i class="bi bi-check-lg me-1"></i> Save Expense</button>
          <a href="{% url 'transactions' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
