{% extends 'tracker/base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-head">
      <div class="icon">👤</div>
      <h4>Create Account</h4>
      <p>Join and start tracking your finances</p>
    </div>
    <div class="auth-body">
      <form method="POST" action="/register">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="userpassword" class="form-control" placeholder="Create a password" required/>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password</label>
          <input type="password" name="confirmpassword" class="form-control" placeholder="Repeat your password" required/>
        </div>
        <button type="submit" class="btn btn-blue w-100 py-2 fw-semibold">
          <i class="bi bi-person-check me-1"></i> Create Account
        </button>
      </form>
      <hr class="my-3"/>
      <p class="text-center text-muted small mb-0">
        Already have an account?
        <a href="/login" class="fw-semibold text-decoration-none" style="color:#1a56db;">Sign in here</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
