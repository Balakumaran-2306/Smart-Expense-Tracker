{% extends 'tracker/base.html' %}
{% block title %}Add Income{% endblock %}
{% block content %}
<div class="mb-3">
  <a href="{% url 'dashboard' %}" class="text-muted text-decoration-none small"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
</div>
<div class="form-card">
  <div class="card">
    <div class="p-3 fw-bold d-flex align-items-center gap-2" style="border-bottom:1px solid var(--border);background:#def7ec;border-radius:.875rem .875rem 0 0;">
      <i class="bi bi-plus-circle-fill text-success"></i>
      <span style="color:#057a55;">Add Income</span>
    </div>
    <div class="p-4">
      <form method="POST" action="{% url 'add_income' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Amount (₹)</label>
          <div class="input-group">
            <span class="input-group-text">₹</span>
            <input type="number" name="amount" class="form-control" placeholder="0.00" step="0.01" min="0.01" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Income Source</label>
          <input type="text" name="source" class="form-control" placeholder="e.g. Salary, Freelance, Business" required/>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-success fw-semibold py-2"><i class="bi bi-check-lg me-1"></i> Save Income</button>
          <a href="{% url 'transactions' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
